    <style>
        .players-page { max-width:720px; margin:0 auto; padding:20px 16px 40px; }

        /* Search */
        .players-search-wrap { margin-bottom:24px; }
        .players-search-input { width:100%; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:#0f0f23; color:#e0e0e0; font-size:15px; outline:none; transition:border 0.2s; }
        .players-search-input:focus { border-color:#c084fc; }
        .players-search-input::placeholder { color:#666; }

        /* Friends section */
        .players-section-title { font-size:18px; font-weight:700; color:#fff; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .players-section-title .count { font-size:13px; color:#94a3b8; font-weight:400; }

        .friends-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
        .friend-card { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:10px 14px; text-decoration:none; color:inherit; transition:background 0.2s; }
        .friend-card:hover { background:rgba(255,255,255,0.08); }
        .friend-card-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; flex-shrink:0; font-size:24px; display:flex; align-items:center; justify-content:center; }
        .friend-card-info { display:flex; flex-direction:column; }
        .friend-card-nick { font-size:14px; font-weight:600; color:#fff; }
        .friend-card-rating { font-size:12px; color:#c084fc; }
        .no-friends { color:#94a3b8; font-size:14px; padding:20px 0; text-align:center; }

        /* Players list */
        .players-list { display:flex; flex-direction:column; gap:4px; }
        .player-row { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; text-decoration:none; color:inherit; transition:background 0.15s; }
        .player-row:hover { background:rgba(255,255,255,0.05); }
        .player-row-rank { width:36px; text-align:center; font-size:13px; color:#94a3b8; flex-shrink:0; }
        .player-row-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; font-size:22px; display:flex; align-items:center; justify-content:center; }
        .player-row-info { flex:1; min-width:0; }
        .player-row-nick { font-size:14px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .player-row-stats { font-size:11px; color:#94a3b8; }
        .player-row-rating { font-size:14px; font-weight:700; color:#c084fc; flex-shrink:0; text-align:right; min-width:50px; }
        .player-row-games { font-size:12px; color:#666; flex-shrink:0; text-align:right; min-width:40px; display:none; }
        @media(min-width:480px) { .player-row-games { display:block; } }

        .players-loading { text-align:center; color:#94a3b8; padding:40px 20px; }
        .players-empty { text-align:center; color:#94a3b8; padding:40px 20px; font-size:14px; }
    </style>
