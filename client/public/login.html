<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WolfSheep — Вход</title>
    <link rel="stylesheet" href="css/style.css"/>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="caed2020-b671-4c7d-94b2-27e9399d4dca"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container { max-width:400px; width:100%; background:#0d0d1a; border:2px solid #2a1a5a; border-radius:20px; padding:36px 32px; box-shadow:0 0 40px rgba(138,43,226,0.2); text-align:center; }
        .auth-container p { color:#94a3b8; font-size:14px; margin-bottom:24px; }
        .google-btn-wrapper { display:flex; justify-content:center; margin-bottom:16px; }
        .auth-error { color:#ff3366; font-size:13px; text-align:center; min-height:20px; margin-top:12px; }
        .auth-play-guest { margin-top:16px; text-align:center; }
        .auth-play-guest a { color:#94a3b8; text-decoration:underline; font-size:14px; }
        .auth-loading { display:none; color:#c084fc; font-size:14px; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    </style>
</head>
<body>
    <div id="main-content">
        <h1 class="home-title" style="margin-top:20px;"><span class="wolf">WOLF</span><span class="sheep">SHEEP</span></h1>
        <div class="auth-container">
            <p>Sign in with your Google account to save progress, climb the leaderboard, and unlock your WolfSheep nickname.</p>
            <div class="google-btn-wrapper">
                <div id="g_id_onload"
                     data-client_id="632162253266-42grlsk3jgboladf7ivb0lsontujrvsi.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="filled_blue"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
            <div class="auth-loading" id="auth-loading">Signing in…</div>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-play-guest"><a href="/">Play without account</a></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="/about.html">About Us</a>
            <a href="/rules.html">Game Rules</a>
            <a href="/privacy.html">Privacy Policy</a>
            <a href="/terms.html">Terms of Service</a>
        </div>
        <div class="footer-copy">© 2025 WolfSheep.fun — All rights reserved</div>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
