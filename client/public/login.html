<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WolfSheep — Вход</title>
    <link rel="stylesheet" href="css/style.css"/>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="caed2020-b671-4c7d-94b2-27e9399d4dca"></script>
    <style>
        .auth-container { max-width:400px; width:100%; background:#0d0d1a; border:2px solid #2a1a5a; border-radius:20px; padding:36px 32px; box-shadow:0 0 40px rgba(138,43,226,0.2); }
        .auth-tabs { display:flex; gap:0; margin-bottom:24px; }
        .auth-tab { flex:1; text-align:center; padding:10px; background:transparent; border:2px solid #2a1a5a; color:#94a3b8; font-weight:600; cursor:pointer; font-family:inherit; font-size:15px; transition:0.2s; }
        .auth-tab:first-child { border-radius:12px 0 0 12px; }
        .auth-tab:last-child { border-radius:0 12px 12px 0; }
        .auth-tab.active { background:#2a1a5a; color:#c084fc; border-color:#8a2be2; }
        .auth-form { display:none; flex-direction:column; gap:16px; }
        .auth-form.active { display:flex; }
        .auth-form input { width:100%; padding:10px 14px; border-radius:12px; background:#1a1a30; border:2px solid #2a1a5a; color:#e0e0f0; font-size:16px; font-family:inherit; outline:none; transition:0.2s; }
        .auth-form input:focus { border-color:#8a2be2; }
        .auth-btn { background:#8a2be2; color:white; border:none; padding:12px; border-radius:30px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; font-family:inherit; width:100%; }
        .auth-btn:hover { background:#a855f7; box-shadow:0 0 25px rgba(138,43,226,0.5); }
        .auth-error { color:#ff3366; font-size:13px; text-align:center; min-height:20px; }
        .auth-play-guest { margin-top:16px; text-align:center; }
        .auth-play-guest a { color:#94a3b8; text-decoration:underline; font-size:14px; }
    </style>
</head>
<body>
    <div id="main-content">
        <h1 class="home-title" style="margin-top:20px;"><span class="wolf">WOLF</span><span class="sheep">SHEEP</span></h1>
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            <div class="auth-form active" id="form-login">
                <input type="text" id="loginUser" placeholder="Логин" />
                <input type="password" id="loginPass" placeholder="Пароль" />
                <button class="auth-btn" id="loginBtn">Войти</button>
            </div>
            <div class="auth-form" id="form-register">
                <input type="text" id="regUser" placeholder="Логин (от 2 символов)" />
                <input type="password" id="regPass" placeholder="Пароль (от 4 символов)" />
                <button class="auth-btn" id="regBtn">Зарегистрироваться</button>
            </div>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-play-guest"><a href="/">Играть без аккаунта</a></div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
