<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WolfSheep — Quoridor Online</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <nav id="navbar">
        <a class="nav-brand" href="/">🐺<span style="color:#ff3366">Wolf</span><span style="color:#33ff66">Sheep</span></a>
        <a class="nav-link active" href="/">🏠 Главная</a>
        <a class="nav-link" href="/profile.html">👤 Профиль</a>
    </nav>

    <div id="main-content">
        <h1 class="home-title"><span class="wolf">WOLF</span><span class="sheep">SHEEP</span></h1>
        <p class="home-subtitle">Quoridor · стратегическая настольная игра</p>
        <div class="mode-cards">
            <div class="mode-card" data-tc="1+5">
                <div class="tc-icon">⚡</div>
                <div class="tc-name">1 + 5</div>
                <div class="tc-desc">1 минута<br>+ 5 секунд за ход</div>
                <button class="tc-btn">Играть</button>
            </div>
            <div class="mode-card" data-tc="3+2">
                <div class="tc-icon">🔥</div>
                <div class="tc-name">3 + 2</div>
                <div class="tc-desc">3 минуты<br>+ 2 секунды за ход</div>
                <button class="tc-btn">Играть</button>
            </div>
            <div class="mode-card" data-tc="5">
                <div class="tc-icon">💎</div>
                <div class="tc-name">5 мин</div>
                <div class="tc-desc">5 минут<br>без добавления</div>
                <button class="tc-btn">Играть</button>
            </div>
        </div>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
