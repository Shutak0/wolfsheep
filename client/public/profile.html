<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#1a1a2e"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="WolfSheep"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <link rel="apple-touch-icon" href="/imgs/icon-192.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>WolfSheep — Profile</title>
    <link rel="stylesheet" href="css/style.css"/>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="caed2020-b671-4c7d-94b2-27e9399d4dca"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .google-btn-wrapper { display:flex; justify-content:center; margin:16px 0; }
        .auth-error { color:#ff3366; font-size:13px; text-align:center; min-height:20px; }
        .auth-loading { display:none; color:#c084fc; font-size:14px; animation:pulse 1.5s infinite; text-align:center; margin-top:8px; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">
            <a class="nav-brand" href="/">🐺<span style="color:#ff3366">Wolf</span><span style="color:#33ff66">Sheep</span></a>
            <a class="nav-link" href="/" data-i18n="nav_home">🏠 Home</a>
            <a class="nav-link active" href="/profile.html" data-i18n="nav_profile">👤 Profile</a>
        </div>
        <div class="nav-center">
            <span class="nav-players" id="nav-players">🟢 0</span>
        </div>
        <div class="nav-right" id="nav-right"></div>
    </nav>

    <div id="main-content">
        <div class="profile-container" id="profile-view" style="display:none">
            <div class="profile-avatar">🐺</div>
            <div class="profile-field">
                <label data-i18n="profile_name_label">Nickname</label>
                <input type="text" id="profileName" placeholder="Enter nickname" />
            </div>
            <div class="profile-field">
                <label data-i18n="profile_color_label">Favorite color</label>
                <input type="text" id="profileColor" placeholder="Red / Green / Auto" />
            </div>
            <div id="profile-msg" style="min-height:22px; font-size:13px; text-align:center; margin-bottom:12px; color:#94a3b8;"></div>
            <button class="profile-save" id="profileSaveBtn" data-i18n="profile_save">💾 Save</button>
            <div class="profile-stats">
                <div class="stat-card"><div class="stat-num" id="stat-rating">1000</div><div class="stat-label" data-i18n="stat_elo">ELO</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-games">0</div><div class="stat-label" data-i18n="stat_games">Games</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-wins">0</div><div class="stat-label" data-i18n="stat_wins">Wins</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-rate">—</div><div class="stat-label" data-i18n="stat_winrate">Winrate</div></div>
            </div>
        </div>

        <div class="profile-container" id="auth-view" style="display:none">
            <div class="profile-avatar">🐺</div>
            <p style="color:#94a3b8; font-size:14px; margin-bottom:20px; text-align:center;">Sign in with Google to create your profile.</p>
            <div class="google-btn-wrapper">
                <div id="g_id_onload_profile"
                     data-client_id="632162253266-42grlsk3jgboladf7ivb0lsontujrvsi.apps.googleusercontent.com"
                     data-callback="handleGoogleLoginProfile"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="filled_blue"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
            <div class="auth-loading" id="auth-loading">Signing in…</div>
            <div class="auth-error" id="auth-error"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="/about.html">About Us</a>
            <a href="/rules.html">Game Rules</a>
            <a href="/privacy.html">Privacy Policy</a>
            <a href="/terms.html">Terms of Service</a>
        </div>
        <div class="footer-copy">© 2025 WolfSheep.fun — All rights reserved</div>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/nav-players.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
