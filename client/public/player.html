    <style>
        .player-loading { text-align:center; color:#94a3b8; padding:40px 20px; font-size:16px; }
        .player-error { text-align:center; color:#ff3366; padding:40px 20px; font-size:16px; }
        .player-share-section { margin-top:24px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); }
        .player-share-label { color:#94a3b8; font-size:12px; margin-bottom:8px; text-align:center; }
        .player-share-url { display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; }
        .player-share-input { background:#0f0f23; border:1px solid rgba(255,255,255,0.12); color:#e0e0e0; padding:8px 12px; border-radius:8px; font-size:13px; width:260px; max-width:100%; text-align:center; }
        .player-share-copy { background:#c084fc; color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
        .player-share-copy:hover { background:#a855f7; }
        .player-share-copy:active { background:#9333ea; }
        .friend-btn-section { margin-top:16px; text-align:center; }
        .friend-btn { padding:10px 24px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .friend-btn-add { background:#33ff66; color:#0a0a1a; }
        .friend-btn-add:hover { background:#28cc52; }
        .friend-btn-remove { background:#ff3366; color:#fff; }
        .friend-btn-remove:hover { background:#cc2952; }
        .friend-btn-login { background:#c084fc; color:#fff; }
        .friend-btn-login:hover { background:#a855f7; }
        .friend-btn-loading { background:#555; color:#ccc; cursor:wait; }

        /* Challenge section */
        .challenge-section { margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); text-align:center; }
        .challenge-label { color:#94a3b8; font-size:12px; margin-bottom:10px; }
        .challenge-tc-select { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:10px; }
        .challenge-tc-btn { padding:8px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:#e0e0e0; font-size:13px; cursor:pointer; transition:all 0.2s; }
        .challenge-tc-btn:hover { border-color:#c084fc; color:#c084fc; }
        .challenge-tc-btn.selected { background:#c084fc; color:#fff; border-color:#c084fc; font-weight:700; }
        .challenge-invite-btn { padding:10px 24px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; background:#ffaa00; color:#0a0a1a; }
        .challenge-invite-btn:hover { background:#ff8c00; }
        .challenge-invite-btn:disabled { background:#555; color:#ccc; cursor:not-allowed; }
    </style>

<body>
    <nav id="navbar">
        <button id="hamburger-btn" aria-label="Menu">☰</button>
        <div class="nav-left" id="nav-left-menu">
            <a class="nav-brand" href="/">🐺<span style="color:#ff3366">Wolf</span><span style="color:#33ff66">Sheep</span></a>
            <a class="nav-link" href="/" data-i18n="nav_home">🏠 Home</a>
        </div>
        <div class="nav-center">
            <span class="nav-players" id="nav-players">🟢 0</span>
        </div>
        <div class="nav-right" id="nav-right"></div>
    </nav>
    <div id="nav-overlay"></div>

    <div id="main-content">
        <div class="profile-container" id="player-loading">
            <div class="profile-avatar">🐺</div>
            <div class="player-loading">Loading profile…</div>
        </div>

        <div class="profile-container" id="player-view" style="display:none">
            <div class="profile-avatar" id="player-avatar">🐺</div>
            <div class="profile-field" style="text-align:center;">
                <label style="font-size:20px; font-weight:700; color:#fff;" id="player-nick">—</label>
            </div>
            <div class="profile-stats">
                <div class="stat-card"><div class="stat-num" id="stat-rating">1000</div><div class="stat-label" data-i18n="stat_elo">ELO</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-games">0</div><div class="stat-label" data-i18n="stat_games">Games</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-wins">0</div><div class="stat-label" data-i18n="stat_wins">Wins</div></div>
                <div class="stat-card"><div class="stat-num" id="stat-rate">—</div><div class="stat-label" data-i18n="stat_winrate">Winrate</div></div>
            </div>
            <div class="friend-btn-section" id="friend-btn-container"></div>
            <!-- Challenge section -->
            <div class="challenge-section" id="challenge-section">
                <div class="challenge-label">⚔️ Invite to Battle</div>
                <div class="challenge-tc-select" id="challenge-tc-select">
                    <button class="challenge-tc-btn selected" data-tc="1+5">1+5 ⚡</button>
                    <button class="challenge-tc-btn" data-tc="3+2">3+2 🕐</button>
                    <button class="challenge-tc-btn" data-tc="5+0">5+0 💎</button>
                </div>
                <button class="challenge-invite-btn" id="challenge-invite-btn">⚔️ Invite</button>
            </div>
            <div class="player-share-section">
                <div class="player-share-label">📎 Share this profile</div>
                <div class="player-share-url">
                    <input type="text" class="player-share-input" id="player-share-link" readonly />
                    <button class="player-share-copy" id="player-share-copy">📋 Copy</button>
                </div>
            </div>
        </div>

        <div class="profile-container" id="player-error" style="display:none">
            <div class="profile-avatar">🐺</div>
            <div class="player-error" id="player-error-msg">Player not found.</div>
        </div>
    </div>
